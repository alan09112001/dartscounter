<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Darts App</title>

    <!-- Manifest externe -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS PWA -->

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

    <!-- Tailwind CSS -->

    <!-- Firebase (second écran via Realtime DB, fiable en PWA et derrière firewall) -->

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <!-- QR code generator -->

    <script>
        // Initialisation Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBv2ayEEKUwmXVCpIXA6zEz_5C2zdpbIIY",
            authDomain: "darts-app-15809.firebaseapp.com",
            databaseURL: "https://darts-app-15809-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "darts-app-15809",
            storageBucket: "darts-app-15809.firebasestorage.app",

        firebase.initializeApp(firebaseConfig);

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#020617', panel: '#0f172a', card: '#1e293b',
                        border: '#334155', muted: '#475569', textMuted: '#94a3b8',
                        double: '#3b82f6', triple: '#ef4444', miss: '#64748b',
                        closed: '#10B981', defend: '#ef4444', defendSoft: '#fca5a5'
                    }
                }
            }
        }
    </script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #020617;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        #root { width: 100%; height: 100%; }
        ::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .pulse { animation: pulseAnim 1.4s infinite; }
        @keyframes pulseAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
